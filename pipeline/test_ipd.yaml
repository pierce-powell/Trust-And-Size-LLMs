seed: 42

models:
  - family: "qwen2.5"
    alias: "qwen2.5"
    task_type: "causal"
    sizes:
      - id: "Qwen/Qwen2.5-0.5B-Instruct"
        size_name: "0.5B"

  - family: "llama3"
    alias: "llama3"
    task_type: "causal"
    sizes:
      - id: "meta-llama/Llama-3.2-1B-Instruct"
        size_name: "1B"

prompts:
  qwen2.5:
    - "You are playing the iterated prisioners dilema. History:\n{history}\nAs {you}, choose C or D."
    - "You are playing the iterated prisioners dilema. Given past rounds:\n{history}\nReply only with C or D."
  llama3:
    - "You are playing the iterated prisioners dilema.  Game so far:\n{history}\nAs {you}, reply C or D."
    - " You are playing the iterated prisioners dilema. Rounds:\n{history}\nChoose C or D, no other text."

base_strategies_list:
  - "TFT"
  - "2TFT"

metrics:
  - "trust"
  - "cooperation_streak"

run:
  rounds: 4
  prompts_per_model: 2
  max_new_tokens: 8

out_path: "pipeline/ipd_results_test.json"
