seed: 42

models:
  - family: "llama3"
    alias: "llama3"
    task_type: "causal"
    sizes:
      - id: "openlm-research/open_llama_3b"
        size_name: "3B"


prompts:
  qwen2.5:
    - "You are playing the iterated prisioners dilema. History:\n{history}\nAs {you}, choose C or D."
    - "You are playing the iterated prisioners dilema. Given past rounds:\n{history}\nReply only with C or D."
  llama3:
    - "You are playing the iterated prisioners dilema. History:\n{history}\nAs {you}, choose C or D."
    - "You are playing the iterated prisioners dilema. Given past rounds:\n{history}\nReply only with C or D."

base_strategies_list:
  - "TFT"
  - "2TFT"

metrics:
  - "trust"
  - "cooperation_streak"

run:
  rounds: 4
  prompts_per_model: 2
  max_new_tokens: 8

out_path: "pipeline/ipd_results_test.json"
